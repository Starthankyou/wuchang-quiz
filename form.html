<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>無常 — 匿名填答</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: #0f0f13;
    color: #e8e8f0;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  /* ── 進度條 ── */
  .progress-bar {
    width: 100%;
    height: 3px;
    background: #1e1e30;
    position: fixed;
    top: 0; left: 0;
    z-index: 100;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #7c6fff, #ff6fb0);
    transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    width: 0%;
  }

  /* ── 頂부 ── */
  .header {
    width: 100%;
    text-align: center;
    padding: 44px 24px 20px;
    border-bottom: 1px solid #1a1a28;
  }

  .live-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(74,222,128,0.08);
    border: 1px solid rgba(74,222,128,0.2);
    border-radius: 100px;
    padding: 5px 14px;
    font-size: 11px;
    color: #4ade80;
    font-weight: 600;
    letter-spacing: 0.1em;
  }

  .live-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: #4ade80;
    animation: blink 1.4s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  /* ── 頁面容器（滑動用）── */
  .pages-wrapper {
    width: 100%;
    overflow: hidden;
    flex: 1;
  }

  .pages-track {
    display: flex;
    transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1);
    width: 300%;
  }

  .page {
    width: 33.333%;
    min-height: calc(100dvh - 89px);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 36px 24px 40px;
  }

  /* ── 步驟指示 ── */
  .step-indicator {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 32px;
  }

  .step-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #2e2e42;
    transition: all 0.3s;
  }

  .step-dot.active {
    background: #7c6fff;
    box-shadow: 0 0 8px rgba(124,111,255,0.6);
    width: 24px;
    border-radius: 4px;
  }

  .step-dot.done {
    background: #4ade80;
  }

  /* ── 問題卡片 ── */
  .q-number {
    font-size: 13px;
    font-weight: 700;
    color: #7c6fff;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .q-title {
    font-size: 26px;
    font-weight: 900;
    line-height: 1.55;
    color: #e8e8f0;
    text-align: center;
    margin-bottom: 10px;
    width: 100%;
  }

  .q-hint {
    font-size: 16px;
    color: #7a7a9a;
    text-align: center;
    margin-bottom: 32px;
  }

  /* ── 輸入框 ── */
  textarea {
    display: block;
    width: 100%;
    max-width: 440px;
    background: #16161f;
    border: 2px solid #2a2a3e;
    border-radius: 16px;
    padding: 18px;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 18px;
    line-height: 1.6;
    color: #e8e8f0;
    resize: none;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    -webkit-appearance: none;
    appearance: none;
  }

  textarea::placeholder { color: #3a3a52; }

  textarea:focus {
    border-color: #7c6fff;
    box-shadow: 0 0 0 4px rgba(124,111,255,0.12);
  }

  .char-count {
    width: 100%;
    max-width: 440px;
    text-align: right;
    font-size: 13px;
    color: #3a3a52;
    margin-top: 8px;
    margin-bottom: 28px;
  }

  .char-count.warn { color: #f87171; }

  /* ── 送出按鈕 ── */
  .submit-btn {
    display: block;
    width: 100%;
    max-width: 440px;
    padding: 20px;
    background: #7c6fff;
    border: none;
    border-radius: 16px;
    color: white;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: all 0.15s;
    box-shadow: 0 6px 24px rgba(124,111,255,0.3);
  }

  .submit-btn:active { transform: scale(0.97); }
  .submit-btn:disabled { opacity: 0.35; transform: none; }

  /* ── 感謝頁 ── */
  .thank-page {
    justify-content: center;
    text-align: center;
  }

  .thank-icon {
    font-size: 72px;
    margin-bottom: 24px;
    animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }

  @keyframes popIn {
    from { transform: scale(0); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }

  .thank-title {
    font-size: 32px;
    font-weight: 900;
    color: #e8e8f0;
    margin-bottom: 12px;
  }

  .thank-sub {
    font-size: 17px;
    color: #5a5a7a;
    line-height: 1.7;
  }

  .thank-again-btn {
    margin-top: 40px;
    display: inline-block;
    padding: 14px 32px;
    background: transparent;
    border: 1.5px solid #2e2e42;
    border-radius: 100px;
    color: #5a5a7a;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 15px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .thank-again-btn:hover { border-color: #7c6fff; color: #7c6fff; }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: calc(28px + env(safe-area-inset-bottom, 0px));
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #f87171;
    color: white;
    padding: 13px 28px;
    border-radius: 100px;
    font-size: 15px;
    font-weight: 700;
    white-space: nowrap;
    z-index: 999;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="progress-bar"><div class="progress-fill" id="progress"></div></div>

<div class="header">
  <div class="live-badge"><div class="live-dot"></div>LIVE · 匿名填答</div>
</div>

<div class="pages-wrapper">
  <div class="pages-track" id="track">

    <!-- ── Q1 ── -->
    <div class="page" id="page-q1">
      <div class="step-indicator">
        <div class="step-dot active" id="dot0"></div>
        <div class="step-dot" id="dot1"></div>
        <div class="step-dot" id="dot2"></div>
      </div>
      <div class="q-number">第 1 題，共 2 題</div>
      <div class="q-title">看到「無常」，<br>你會想到什麼?</div>
      <div class="q-hint">關鍵字回答即可</div>
      <textarea id="input-q1" rows="2" maxlength="30"
        placeholder="輸入你的答案..."
        style="height: 80px;"
      ></textarea>
      <div class="char-count" id="count-q1">0 / 30</div>
      <button class="submit-btn" id="btn-q1">送出，前往第 2 題 →</button>
    </div>

    <!-- ── Q2 ── -->
    <div class="page" id="page-q2">
      <div class="step-indicator">
        <div class="step-dot done" id="dot0b"></div>
        <div class="step-dot active" id="dot1b"></div>
        <div class="step-dot" id="dot2b"></div>
      </div>
      <div class="q-number">第 2 題，共 2 題</div>
      <div class="q-title">為何人生<br>要有「無常」?</div>
      <div class="q-hint">請盡量詳答沒關係</div>
      <textarea id="input-q2" rows="6" maxlength="300"
        placeholder="輸入你的答案..."
        style="height: 200px;"
      ></textarea>
      <div class="char-count" id="count-q2">0 / 300</div>
      <button class="submit-btn" id="btn-q2">送出答案 ✓</button>
    </div>

    <!-- ── 感謝 ── -->
    <div class="page thank-page" id="page-thanks">
      <div class="thank-icon">🙏</div>
      <div class="thank-title">感謝你的填答！</div>
      <div class="thank-sub">你的答案已即時出現在<br>螢幕上的文字雲。</div>
      <button class="thank-again-btn" id="btn-again">再填一次</button>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  // ⚠️ 換成你自己的 Firebase 設定
  const firebaseConfig = {
    apiKey: "AIzaSyAWpWx3jMsRYLFXRZFdtqI-SfiPmV16xFY",
    authDomain: "wuchang-quiz.firebaseapp.com",
    databaseURL: "https://wuchang-quiz-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "wuchang-quiz",
    storageBucket: "wuchang-quiz.firebasestorage.app",
    messagingSenderId: "845309148289",
    appId: "1:845309148289:web:7c296d6a51798f43352180"
  };

  let db = null;
  try {
    const app = initializeApp(firebaseConfig);
    db = getDatabase(app);
  } catch(e) { console.warn("Firebase 未設定"); }

  // ── 頁面切換 ──
  let currentPage = 0;
  const track = document.getElementById('track');
  const progress = document.getElementById('progress');
  const progressSteps = ['33%', '66%', '100%'];

  function goTo(page) {
    currentPage = page;
    track.style.transform = `translateX(-${page * 33.333}%)`;
    progress.style.width = progressSteps[page];
    // 自動 focus 輸入框
    if (page === 0) setTimeout(() => document.getElementById('input-q1').focus(), 500);
    if (page === 1) setTimeout(() => document.getElementById('input-q2').focus(), 500);
  }

  // ── 字數計算 ──
  document.getElementById('input-q1').addEventListener('input', () => {
    const len = document.getElementById('input-q1').value.length;
    const el = document.getElementById('count-q1');
    el.textContent = `${len} / 30`;
    el.classList.toggle('warn', len >= 27);
  });

  document.getElementById('input-q2').addEventListener('input', () => {
    const len = document.getElementById('input-q2').value.length;
    const el = document.getElementById('count-q2');
    el.textContent = `${len} / 300`;
    el.classList.toggle('warn', len >= 270);
  });

  // ── Q1 送出 ──
  document.getElementById('btn-q1').addEventListener('click', async () => {
    const text = document.getElementById('input-q1').value.trim();
    if (!text) { showToast('請輸入答案'); return; }

    const btn = document.getElementById('btn-q1');
    btn.disabled = true;
    btn.textContent = '送出中...';

    try {
      if (db) await push(ref(db, 'answers/q1'), { text, ts: Date.now() });
      goTo(1);
    } catch(e) {
      showToast('送出失敗，請再試');
    } finally {
      btn.disabled = false;
      btn.textContent = '送出，前往第 2 題 →';
    }
  });

  // ── Q2 送出 ──
  document.getElementById('btn-q2').addEventListener('click', async () => {
    const text = document.getElementById('input-q2').value.trim();
    if (!text) { showToast('請輸入答案'); return; }

    const btn = document.getElementById('btn-q2');
    btn.disabled = true;
    btn.textContent = '送出中...';

    try {
      if (db) await push(ref(db, 'answers/q2'), { text, ts: Date.now() });
      goTo(2);
    } catch(e) {
      showToast('送出失敗，請再試');
    } finally {
      btn.disabled = false;
      btn.textContent = '送出答案 ✓';
    }
  });

  // ── 再填一次 ──
  document.getElementById('btn-again').addEventListener('click', () => {
    document.getElementById('input-q1').value = '';
    document.getElementById('input-q2').value = '';
    document.getElementById('count-q1').textContent = '0 / 30';
    document.getElementById('count-q2').textContent = '0 / 300';
    goTo(0);
  });

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast';
    void t.offsetWidth;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  // 初始進度
  progress.style.width = '33%';
</script>
</body>
</html>
