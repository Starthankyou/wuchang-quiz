<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>即時文字雲</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');

  :root {
    --bg: #07070d;
    --surface: #10101a;
    --border: #1e1e30;
    --accent: #7c6fff;
    --accent2: #ff6fb0;
    --accent3: #6fffd4;
    --text: #e8e8f0;
    --text-muted: #4a4a6a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* Top bar */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 32px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    z-index: 10;
    background: rgba(7,7,13,0.9);
    backdrop-filter: blur(10px);
  }

  .question-display {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .q-badge {
    background: var(--accent);
    color: white;
    font-size: 11px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 6px;
    letter-spacing: 0.08em;
    white-space: nowrap;
  }

  .q-text {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    max-width: 600px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .right-controls {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .count-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 6px 16px;
    font-size: 14px;
    color: var(--text-muted);
  }

  .live-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #4ade80;
    animation: livepulse 1.5s ease-in-out infinite;
  }

  @keyframes livepulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(74,222,128,0.4); }
    50% { opacity: 0.7; box-shadow: 0 0 0 6px rgba(74,222,128,0); }
  }

  .tab-btns {
    display: flex;
    gap: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 3px;
  }

  .tab-btn {
    padding: 6px 16px;
    border: none;
    background: transparent;
    color: var(--text-muted);
    border-radius: 6px;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .tab-btn.active {
    background: var(--accent);
    color: white;
    font-weight: 600;
    box-shadow: 0 0 16px rgba(124,111,255,0.4);
  }

  /* Main word cloud area */
  .cloud-container {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  /* Ambient background glow */
  .cloud-container::before {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 80%;
    height: 80%;
    background: radial-gradient(ellipse, rgba(124,111,255,0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  #cloud-canvas {
    width: 100%;
    height: 100%;
    display: block;
  }

  /* Empty state */
  .empty-state {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    pointer-events: none;
  }

  .empty-state svg {
    width: 64px; height: 64px;
    opacity: 0.15;
    margin-bottom: 16px;
  }

  .empty-state p {
    color: var(--text-muted);
    font-size: 16px;
  }

  /* Loading */
  .status-bar {
    padding: 6px 32px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: var(--text-muted);
    flex-shrink: 0;
  }

  .status-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0.6;
  }

  /* Word cloud words rendered via DOM */
  .word-cloud {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .cloud-word {
    position: absolute;
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 700;
    cursor: default;
    transition: transform 0.3s ease, opacity 0.3s ease;
    white-space: nowrap;
    user-select: none;
    animation: wordIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }

  @keyframes wordIn {
    from { opacity: 0; transform: scale(0.5) translate(var(--tx), var(--ty)); }
    to   { opacity: 1; transform: scale(1)   translate(var(--tx), var(--ty)); }
  }

  .cloud-word:hover {
    filter: brightness(1.3);
    z-index: 100 !important;
    transform: scale(1.1) translate(var(--tx), var(--ty)) !important;
  }

  .count-label {
    font-size: 0.45em;
    opacity: 0.7;
    font-weight: 500;
    vertical-align: super;
    margin-left: 2px;
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="question-display">
    <span class="q-badge" id="q-badge">Q1</span>
    <span class="q-text" id="q-text-display">看到「無常」，你會想到什麼? (關鍵字回答即可)</span>
  </div>
  <div class="right-controls">
    <div class="count-badge">
      <div class="live-dot"></div>
      <span id="answer-count">0 則回答</span>
    </div>
    <div class="tab-btns">
      <button class="tab-btn active" data-q="q1" onclick="switchQ('q1')">無常聯想</button>
      <button class="tab-btn" data-q="q2" onclick="switchQ('q2')">無常意義</button>
    </div>
  </div>
</div>

<div class="cloud-container">
  <div id="empty-state" class="empty-state">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
    </svg>
    <p>等待第一則回答...</p>
  </div>
  <div id="word-cloud" class="word-cloud"></div>
</div>

<div class="status-bar">
  <div class="status-dot"></div>
  <span id="status-text">連線中...</span>
</div>

<!-- Firebase + Logic -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  // ⚠️ 換成你自己的 Firebase 設定（與 form.html 相同）
  const firebaseConfig = {
    apiKey: "AIzaSyAWpWx3jMsRYLFXRZFdtqI-SfiPmV16xFY",
    authDomain: "wuchang-quiz.firebaseapp.com",
    databaseURL: "https://wuchang-quiz-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "wuchang-quiz",
    storageBucket: "wuchang-quiz.firebasestorage.app",
    messagingSenderId: "845309148289",
    appId: "1:845309148289:web:7c296d6a51798f43352180"
  };

  // 問題設定
  const QUESTIONS = {
    q1: { label: "無常聯想", text: "看到「無常」，你會想到什麼? (關鍵字回答即可)" },
    q2: { label: "無常意義", text: "為何人生要有「無常」? (請盡量詳答沒關係)" }
  };

  // 顏色組
  const COLORS = [
    '#7c6fff', '#ff6fb0', '#6fffd4', '#ffd06f',
    '#ff9a6f', '#6fbaff', '#c46fff', '#6fffb0',
    '#ff6f6f', '#6fe8ff'
  ];

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  let currentQ = 'q1';
  let allAnswers = { q1: [], q2: [] };
  let freqCache = { q1: null, q2: null };
  let updateTimer = null;
  let lastCount = { q1: 0, q2: 0 };
  let isRendering = false;

  // Switch question tab
  window.switchQ = function(q) {
    currentQ = q;
    document.querySelectorAll('.tab-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.q === q);
    });
    updateTopbar();
    buildFreq();
  }

  function updateTopbar() {
    const q = QUESTIONS[currentQ];
    document.getElementById('q-badge').textContent = currentQ === 'q1' ? 'Q1' : 'Q2';
    document.getElementById('q-text-display').textContent = q.text;
    document.getElementById('answer-count').textContent =
      `${allAnswers[currentQ].length} 則回答`;
  }

  // Listen to Firebase
  ['q1', 'q2'].forEach(q => {
    onValue(ref(db, `answers/${q}`), snap => {
      const answers = [];
      if (snap.exists()) {
        snap.forEach(child => {
          const v = child.val();
          if (v && v.text) answers.push(v.text);
        });
      }
      allAnswers[q] = answers;
      document.getElementById('status-text').textContent =
        `上次更新：${new Date().toLocaleTimeString('zh-TW')}`;

      if (q === currentQ) {
        updateTopbar();
        scheduleUpdate();
      }
    });
  });

  // Debounced update
  function scheduleUpdate() {
    if (updateTimer) clearTimeout(updateTimer);
    updateTimer = setTimeout(buildFreq, 300);
  }

  // 純字頻統計，相同答案放大
  function buildFreq() {
    const answers = allAnswers[currentQ];
    if (answers.length === 0) {
      freqCache[currentQ] = [];
      renderCloud();
      return;
    }
    if (freqCache[currentQ] && lastCount[currentQ] === answers.length) {
      renderCloud();
      return;
    }
    const freq = {};
    answers.forEach(a => {
      const key = a.trim();
      if (key) freq[key] = (freq[key] || 0) + 1;
    });
    freqCache[currentQ] = Object.entries(freq)
      .map(([word, count]) => ({ word, count }))
      .sort((a, b) => b.count - a.count)
      .slice(0, 30);
    lastCount[currentQ] = answers.length;
    document.getElementById('status-text').textContent =
      `上次更新：${new Date().toLocaleTimeString('zh-TW')}`;
    renderCloud();
  }

  // Render word cloud
  function renderCloud() {
    if (isRendering) return;
    isRendering = true;

    const container = document.getElementById('word-cloud');
    const emptyState = document.getElementById('empty-state');
    const words = freqCache[currentQ] || [];

    if (words.length === 0) {
      container.innerHTML = '';
      emptyState.style.display = 'block';
      isRendering = false;
      return;
    }

    emptyState.style.display = 'none';

    const W = container.clientWidth;
    const H = container.clientHeight;
    const cx = W / 2;
    const cy = H / 2;

    const maxCount = words[0]?.count || 1;
    const minCount = words[words.length - 1]?.count || 1;

    // Font size scale: 24px to 96px
    function fontSize(count) {
      if (maxCount === minCount) return 52;
      const t = (count - minCount) / (maxCount - minCount);
      return Math.round(24 + t * 72);
    }

    // Spiral placement to avoid overlap
    function placeWords(wordList) {
      const placed = [];
      const rects = [];

      for (let i = 0; i < wordList.length; i++) {
        const item = wordList[i];
        const fs = fontSize(item.count);
        const charW = fs * 0.95; // approximate CJK char width
        const w = item.word.length * charW + 60; // extra for count badge
        const h = fs * 1.4;
        const color = COLORS[i % COLORS.length];

        let placed_ok = false;
        // Spiral outward from center
        for (let r = 0; r < Math.max(W, H); r += 8) {
          const steps = Math.max(1, Math.round(2 * Math.PI * r / 20));
          for (let s = 0; s < steps; s++) {
            const angle = (2 * Math.PI * s / steps) + (i * 0.5);
            const tx = Math.round(cx + r * Math.cos(angle) - w / 2);
            const ty = Math.round(cy + r * Math.sin(angle) - h / 2);

            // Bounds check
            if (tx < 4 || ty < 4 || tx + w > W - 4 || ty + h > H - 4) continue;

            // Collision check
            const candidate = { x: tx, y: ty, w, h };
            const collides = rects.some(rect =>
              candidate.x < rect.x + rect.w + 10 &&
              candidate.x + candidate.w > rect.x - 10 &&
              candidate.y < rect.y + rect.h + 6 &&
              candidate.y + candidate.h > rect.y - 6
            );

            if (!collides) {
              rects.push(candidate);
              placed.push({ ...item, x: tx, y: ty, fs, color });
              placed_ok = true;
              break;
            }
          }
          if (placed_ok) break;
        }
        if (!placed_ok) {
          // Force place if no room
          placed.push({ ...item, x: Math.random()*(W-100)+50, y: Math.random()*(H-60)+30, fs: Math.max(18, fs-12), color });
        }
      }
      return placed;
    }

    const placed = placeWords(words);

    // Diff render — only update changed words
    const existing = {};
    container.querySelectorAll('.cloud-word').forEach(el => {
      existing[el.dataset.word] = el;
    });

    const newWords = new Set(placed.map(p => p.word));

    // Remove words no longer present
    Object.keys(existing).forEach(w => {
      if (!newWords.has(w)) {
        existing[w].style.opacity = '0';
        setTimeout(() => existing[w].remove(), 300);
      }
    });

    // Add or update
    placed.forEach((item, idx) => {
      const translateX = item.x - cx;
      const translateY = item.y - cy;

      if (existing[item.word]) {
        // Update existing
        const el = existing[item.word];
        el.style.setProperty('--tx', translateX + 'px');
        el.style.setProperty('--ty', translateY + 'px');
        el.style.transform = `translate(${translateX}px, ${translateY}px)`;
        el.style.fontSize = item.fs + 'px';
        el.style.color = item.color;
        el.style.zIndex = 20 - idx;
        const badge = el.querySelector('.count-label');
        if (badge && item.count > 1) badge.textContent = `×${item.count}`;
      } else {
        // Create new word element
        const el = document.createElement('span');
        el.className = 'cloud-word';
        el.dataset.word = item.word;
        el.style.setProperty('--tx', translateX + 'px');
        el.style.setProperty('--ty', translateY + 'px');
        el.style.transform = `translate(${translateX}px, ${translateY}px)`;
        el.style.fontSize = item.fs + 'px';
        el.style.color = item.color;
        el.style.zIndex = 20 - idx;
        el.style.left = cx + 'px';
        el.style.top = cy + 'px';
        el.style.animationDelay = (idx * 0.04) + 's';
        el.textContent = item.word;
        if (item.count > 1) {
          const badge = document.createElement('span');
          badge.className = 'count-label';
          badge.textContent = `×${item.count}`;
          el.appendChild(badge);
        }
        container.appendChild(el);
      }
    });

    isRendering = false;
  }

  // Re-render on resize
  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
      document.getElementById('word-cloud').innerHTML = '';
      renderCloud();
    }, 300);
  });

  // Init topbar
  updateTopbar();
</script>
</body>
</html>
